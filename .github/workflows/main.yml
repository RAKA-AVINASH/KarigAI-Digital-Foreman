name: Build KarigAI APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Disable Desktop Platforms
        run: |
          flutter config --no-enable-linux-desktop
          flutter config --no-enable-macos-desktop
          flutter config --no-enable-windows-desktop
          flutter config --no-enable-web

      - name: Clean and Navigate
        run: |
          cd karigai_mobile
          flutter clean
          flutter pub cache clean
          flutter pub get

      - name: Repair Android
        run: flutter create --platforms=android .
        working-directory: karigai_mobile
        continue-on-error: true
        
      - name: Build APK
        run: flutter build apk --release -t ${{ github.workspace }}/karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart
        working-directory: karigai_mobile
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
