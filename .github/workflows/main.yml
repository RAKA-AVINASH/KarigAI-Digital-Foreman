name: Build KarigAI APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # 🔥 YAHAN CHANGE HAI: Missing package add karna aur sabko upgrade karna
      - name: Fix and Install Dependencies
        run: |
          flutter pub add audioplayers
          flutter pub upgrade
          flutter pub get
        working-directory: karigai_mobile
        
      - name: Repair Android Files
        run: flutter create .
        working-directory: karigai_mobile
        
      - name: Build APK
        run: flutter build apk --release -t ${{ github.workspace }}/karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart
        working-directory: karigai_mobile
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
