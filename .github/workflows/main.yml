name: Build KarigAI APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: karigai_mobile

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable
          cache: true

      # Disable desktop platforms
      - name: Disable Desktop Platforms
        run: |
          flutter config --no-enable-linux-desktop
          flutter config --no-enable-windows-desktop
          flutter config --no-enable-macos-desktop

      # Remove generated desktop folders
      - name: Remove Desktop Platform Folders
        run: |
          rm -rf linux
          rm -rf windows
          rm -rf macos

      # Remove broken lock file
      - name: Clean Dependency State
        run: |
          rm -f pubspec.lock
          flutter clean

      # IMPORTANT:
      # remove broken record_linux package
      - name: Remove Broken Plugin
        run: |
          flutter pub remove record_linux || true

      # Install dependencies fresh
      - name: Install Dependencies
        run: flutter pub get

      # Build APK
      - name: Build APK
        run: |
          flutter build apk \
            --release \
            -t ../karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
