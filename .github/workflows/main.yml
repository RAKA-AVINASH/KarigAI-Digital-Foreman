name: Build KarigAI APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: karigai_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Clean old android project
      - name: Remove Broken Android Folder
        run: rm -rf android

      # Recreate proper android project
      - name: Generate Android Project
        run: flutter create --platforms=android .

      # Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Build APK
      - name: Build APK
        run: |
          flutter build apk \
          --release \
          -t ../karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart

      # Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
