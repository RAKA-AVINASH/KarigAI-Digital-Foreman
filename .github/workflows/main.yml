name: Build KarigAI APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'   # lock to a stable version

      - name: Install dependencies
        working-directory: karigai_mobile
        run: flutter pub get

      - name: Clean build cache
        working-directory: karigai_mobile
        run: flutter clean

      # 🚫 Do NOT add record_linux
      # Instead, disable Linux desktop so it never compiles
      - name: Disable desktop targets
        run: |
          flutter config --no-enable-linux-desktop
          flutter config --no-enable-macos-desktop
          flutter config --no-enable-windows-desktop

      - name: Build APK
        working-directory: karigai_mobile
        run: flutter build apk --release \
          --target=${{ github.workspace }}/karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
