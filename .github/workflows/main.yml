name: Build KarigAI APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: karigai_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ONLY clean cache
      - name: Clean Flutter
        run: flutter clean

      # Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Build APK
      - name: Build APK
        run: |
          flutter build apk \
          --release \
          -t ../karigai_backend/ml_models/models/colab_models/Secondary_Frontend/main.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KarigAI-App-Release
          path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
