name: KarigAI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Backend Tests
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_karigai
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./karigai_backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run linting
      working-directory: ./karigai_backend
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run type checking
      working-directory: ./karigai_backend
      run: mypy . --ignore-missing-imports
    
    - name: Run tests
      working-directory: ./karigai_backend
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_karigai
        REDIS_URL: redis://localhost:6379
        ENVIRONMENT: testing
        SECRET_KEY: test-secret-key-for-ci
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      run: |
        pytest tests/ -v --cov=app --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./karigai_backend/coverage.xml

  # Flutter Tests
  flutter-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Install dependencies
      working-directory: ./karigai_mobile
      run: flutter pub get
    
    - name: Run analyzer
      working-directory: ./karigai_mobile
      run: flutter analyze
    
    - name: Run tests
      working-directory: ./karigai_mobile
      run: flutter test --coverage
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./karigai_mobile/coverage/lcov.info

  # Build and Deploy
  build-and-deploy:
    needs: [backend-test, flutter-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: ${{ secrets.DOCKER_USERNAME }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./karigai_backend
        push: ${{ secrets.DOCKER_USERNAME != '' }}
        tags: ${{ secrets.DOCKER_USERNAME }}/karigai-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
      if: ${{ secrets.DOCKER_USERNAME }}
    
    - name: Build Flutter app
      working-directory: ./karigai_mobile
      run: |
        flutter pub get
        flutter build apk --release
        flutter build appbundle --release
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: karigai-mobile-apk
        path: karigai_mobile/build/app/outputs/flutter-apk/app-release.apk
    
    - name: Upload App Bundle artifact
      uses: actions/upload-artifact@v3
      with:
        name: karigai-mobile-aab
        path: karigai_mobile/build/app/outputs/bundle/release/app-release.aab

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'