# KarigAI Model Serving Deployment Configuration

# Server Configuration
server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  max_requests: 1000
  timeout: 30
  keepalive: 2

# Model Registry Configuration
registry:
  mlflow_tracking_uri: "sqlite:///mlflow.db"
  registry_db_path: "model_registry.json"
  backup_interval_hours: 24
  cleanup_old_versions: true
  max_versions_per_model: 10

# Deployment Environments
environments:
  development:
    min_accuracy: 0.70
    max_latency_ms: 2000
    max_model_size_mb: 1000
    auto_deploy: true
    health_check_interval: 60
    
  staging:
    min_accuracy: 0.80
    max_latency_ms: 1000
    max_model_size_mb: 500
    auto_deploy: false
    health_check_interval: 30
    load_test_required: true
    
  production:
    min_accuracy: 0.85
    max_latency_ms: 500
    max_model_size_mb: 200
    auto_deploy: false
    health_check_interval: 10
    load_test_required: true
    canary_deployment: true
    rollback_on_error: true

# Model Loading Configuration
model_loading:
  preload_production_models: true
  lazy_loading: false
  model_cache_size_gb: 4
  unload_inactive_models: true
  inactive_threshold_hours: 24

# Performance Monitoring
monitoring:
  enabled: true
  metrics_retention_days: 30
  alert_thresholds:
    latency_p95_ms: 1000
    error_rate_percent: 5.0
    memory_usage_percent: 80.0
    cpu_usage_percent: 80.0
  
  # Alerting Configuration
  alerts:
    email:
      enabled: false
      smtp_server: "smtp.gmail.com"
      smtp_port: 587
      recipients: ["admin@karigai.com"]
    
    slack:
      enabled: false
      webhook_url: ""
      channel: "#alerts"
    
    webhook:
      enabled: true
      url: "http://localhost:9000/alerts"
      timeout: 10

# A/B Testing Configuration
ab_testing:
  enabled: true
  default_traffic_split: 0.1
  max_concurrent_tests: 3
  min_test_duration_hours: 24
  statistical_significance: 0.95

# Security Configuration
security:
  api_key_required: false
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst_size: 20
  
  cors:
    enabled: true
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST"]
    allowed_headers: ["*"]

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "model_server.log"
  max_size_mb: 100
  backup_count: 5
  
  # Request logging
  log_requests: true
  log_responses: false
  log_errors: true

# Health Check Configuration
health_checks:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  timeout_seconds: 10
  
  checks:
    - name: "model_registry"
      type: "database"
      critical: true
    
    - name: "memory_usage"
      type: "system"
      threshold: 80
      critical: false
    
    - name: "disk_space"
      type: "system"
      threshold: 90
      critical: true
    
    - name: "model_loading"
      type: "custom"
      critical: true

# Auto-scaling Configuration
autoscaling:
  enabled: false
  min_replicas: 1
  max_replicas: 10
  target_cpu_percent: 70
  target_memory_percent: 70
  scale_up_cooldown: 300
  scale_down_cooldown: 600

# Load Balancing
load_balancing:
  strategy: "round_robin"  # round_robin, least_connections, weighted
  health_check_path: "/health"
  health_check_interval: 10
  unhealthy_threshold: 3
  healthy_threshold: 2

# Caching Configuration
caching:
  enabled: true
  type: "redis"  # redis, memory, disk
  redis:
    host: "localhost"
    port: 6379
    db: 0
    password: null
    ttl_seconds: 3600
  
  memory:
    max_size_mb: 512
    ttl_seconds: 1800
  
  cache_predictions: false  # Usually not recommended for ML
  cache_model_metadata: true
  cache_health_checks: true

# Model Optimization
optimization:
  quantization:
    enabled: true
    default_precision: "fp16"
    int8_threshold_mb: 100
  
  batching:
    enabled: true
    max_batch_size: 32
    timeout_ms: 100
  
  model_compilation:
    enabled: false
    backend: "torch_script"  # torch_script, tensorrt, onnx

# Backup and Recovery
backup:
  enabled: true
  interval_hours: 6
  retention_days: 30
  backup_path: "/backups"
  
  components:
    - "model_registry"
    - "performance_metrics"
    - "deployment_history"
    - "configuration"

# Development and Testing
development:
  debug_mode: false
  hot_reload: false
  mock_models: false
  test_data_path: "test_data/"
  
  # Model validation
  validate_on_load: true
  run_smoke_tests: true
  performance_benchmarks: true

# Integration Configuration
integrations:
  mlflow:
    enabled: true
    tracking_uri: "sqlite:///mlflow.db"
    experiment_name: "karigai_serving"
  
  prometheus:
    enabled: false
    port: 9090
    metrics_path: "/metrics"
  
  grafana:
    enabled: false
    dashboard_url: "http://localhost:3000"
  
  kubernetes:
    enabled: false
    namespace: "karigai"
    service_name: "model-server"
    
  docker:
    enabled: true
    image_name: "karigai/model-server"
    tag: "latest"
    registry: "docker.io"

# Resource Limits
resources:
  memory_limit_gb: 8
  cpu_limit_cores: 4
  gpu_memory_limit_gb: 4
  disk_limit_gb: 100
  
  # Per-model limits
  model_memory_limit_mb: 1000
  model_load_timeout_seconds: 300
  inference_timeout_seconds: 30

# Feature Flags
features:
  model_versioning: true
  a_b_testing: true
  canary_deployments: true
  blue_green_deployments: false
  shadow_traffic: false
  request_tracing: true
  model_explainability: false
  batch_inference: true
  streaming_inference: false